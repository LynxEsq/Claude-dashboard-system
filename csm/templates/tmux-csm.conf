# tmux-csm.conf — Recommended tmux config for use with Claude Session Manager
# Source this from your .tmux.conf:  source-file ~/.config/csm/tmux-csm.conf

# ─── Plugins ────────────────────────────────────────────────
# tmux-resurrect: persist sessions across restarts
# Install: git clone https://github.com/tmux-plugins/tmux-resurrect ~/.tmux/plugins/tmux-resurrect
run-shell ~/.tmux/plugins/tmux-resurrect/resurrect.tmux

# tmux-continuum: auto-save and auto-restore
# Install: git clone https://github.com/tmux-plugins/tmux-continuum ~/.tmux/plugins/tmux-continuum
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'
run-shell ~/.tmux/plugins/tmux-continuum/continuum.tmux

# ─── Status Bar Integration ─────────────────────────────────
# Shows CSM-monitored session count in tmux status bar
set -g status-right '#[fg=cyan]CSM: #{?#{==:#{pane_current_command},claude},●,○} #[default]| %H:%M '

# ─── Session Management ────────────────────────────────────
# Quick-switch between Claude sessions
bind C-b switch-client -l     # toggle last session
bind C-n switch-client -n     # next session
bind C-p switch-client -p     # previous session

# Split and start Claude in new pane
bind C-c split-window -h 'claude'

# ─── Quality of Life ────────────────────────────────────────
set -g mouse on
set -g history-limit 50000
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

# Faster escape (important for vim users running claude)
set -sg escape-time 10

# Don't rename windows automatically
set -g allow-rename off
